meta:
  id: rsi_reversion_v1
  name: RSI Oversold Reversal
  version: 1
  parent_id: null
  created_at: '2026-03-31'
  market: us
  category: reversal
  tags:
  - oversold
  - reversal
  - mean-reversion
  - RSI
  preferred_regime:
  - volatile
  - range_bound
description: 'Suitable for volatile or range-bound markets.

  Core logic:

  1. RSI(14) drops below 30, indicating short-term oversold conditions.

  2. Price is near the 20-day moving average support (deviation within 6%).

  3. Volume picks up relative to the 5-day average, signaling renewed interest.

  4. A stop-signal candle pattern (e.g. hammer, doji, or shrinking volume stabilization)
  confirms the selling pressure is exhausted.

  Entry: Buy at next open after all conditions are met.

  Stop loss: 5% below entry price.

  Take profit: 2.0x risk-reward ratio.

  '
universe:
  market:
  - us_main
  filters:
  - field: market_cap
    op: '>='
    value: 1000000000
entry:
  logic: and
  conditions:
  - indicator: rsi_14
    op: <
    value: 30
  - indicator: close_to_ma20_pct
    op: <=
    value: 0.06
  - indicator: volume_ratio_1d_5d
    op: '>'
    value: 1.3
  - indicator: has_stop_signal
    op: ==
    value: true
  filters:
  - indicator: close_below_ma10
    op: ==
    value: true
  execution:
    timing: next_open
exit:
  stop_loss:
    type: pct
    value: 0.05
  take_profit:
    type: rr
    value: 2.0
  max_holding_days: 10
params:
  tunable:
  - target: entry.conditions[indicator=rsi_14].value
    range:
    - 20
    - 35
    step: 1
    label: RSI oversold threshold
  - target: entry.conditions[indicator=rsi_14].indicator
    range:
    - 7
    - 21
    step: 1
    label: RSI lookback period
  - target: entry.conditions[indicator=close_to_ma20_pct].value
    range:
    - 0.02
    - 0.08
    step: 0.01
    label: MA20 deviation threshold
  - target: entry.conditions[indicator=volume_ratio_1d_5d].value
    range:
    - 1.1
    - 2.0
    step: 0.1
    label: Volume ratio threshold
  - target: entry.conditions[indicator=volume_ratio_1d_5d].indicator
    range:
    - 3
    - 20
    step: 1
    label: Volume ratio baseline window
  - target: exit.stop_loss.value
    range:
    - 0.03
    - 0.08
    step: 0.01
    label: Stop loss percentage
