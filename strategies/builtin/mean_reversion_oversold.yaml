meta:
  id: mean_reversion_oversold_v1
  name: 超跌反弹确认
  version: 1
  parent_id: null
  created_at: '2026-03-31'
  market: a_share
  category: reversal
  tags:
  - 超跌
  - 反弹
  - 均值回归
  preferred_regime:
  - ranging
  - trending_down
description: '适用市场：震荡市

  核心逻辑：

  1. 短期超跌（RSI14 < 30 或偏离20日均线 > 8%）

  2. 基本面/行业基本面无重大恶化

  3. 出现止跌信号（下影线、十字星、缩量企稳）

  4. 成交量从萎缩开始温和回升

  5. 所属行业近期未出现系统性风险

  买入条件：确认止跌后次日

  止损条件：跌破前低

  止盈条件：回归20日均线或1.5R

  '
universe:
  market:
  - a_share_main
  filters:
  - field: market_cap
    op: '>='
    value: 3000000000
  - field: pe_ttm
    op: '>'
    value: 0
entry:
  logic: and
  conditions:
  - indicator: rsi_14
    op: <
    value: 30
  - indicator: deviation_from_ma20_pct
    op: '>'
    value: 0.08
  - indicator: has_stop_signal
    op: ==
    value: true
  - indicator: volume_shrink_then_rise
    op: ==
    value: true
  filters:
  - indicator: sector_risk_flag
    op: ==
    value: false
  - indicator: st_flag
    op: ==
    value: false
exit:
  stop_loss:
    type: pct_from_low
    value: 0.03
  take_profit:
    type: target_ma
    target: ma20
  max_holding_days: 8
params:
  tunable:
  - target: entry.conditions[indicator=rsi_14].value
    range:
    - 20
    - 35
    step: 1
    label: RSI超跌阈值
  - target: entry.conditions[indicator=rsi_14].indicator
    range:
    - 7
    - 21
    step: 1
    label: RSI观察周期
  - target: entry.conditions[indicator=deviation_from_ma20_pct].value
    range:
    - 0.05
    - 0.15
    step: 0.01
    label: 偏离度阈值
  - target: entry.conditions[indicator=deviation_from_ma20_pct].indicator
    range:
    - 10
    - 40
    step: 5
    label: 均线偏离观察周期
  - target: exit.stop_loss.value
    range:
    - 0.02
    - 0.06
    step: 0.01
    label: 止损比例
  - target: exit.take_profit.target
    range:
    - 10
    - 40
    step: 5
    label: 止盈均线周期
